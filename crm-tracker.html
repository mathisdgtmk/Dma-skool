<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DMA — Tracker CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:#050505;color:#f5f0e8;font-family:Montserrat,Arial,sans-serif;min-height:100vh}

/* HEADER */
.hdr{background:#050505;border-bottom:1px solid rgba(201,168,76,.1);padding:0 16px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.hdr-logo{font-family:Bebas Neue,Impact,sans-serif;font-size:16px;letter-spacing:4px;color:#f5f0e8}
.hdr-logo b{color:#C9A84C;font-weight:400}
.hdr-back{display:flex;align-items:center;gap:6px;text-decoration:none;color:rgba(245,240,232,.4);font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase}

/* STATS */
.stats{display:flex;gap:8px;padding:14px}
.stat{flex:1;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:6px;padding:12px 8px;text-align:center}
.stat-n{font-family:Bebas Neue,Impact,sans-serif;font-size:28px;display:block}
.stat-l{font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(245,240,232,.3);margin-top:2px;display:block}

/* FORM AJOUT */
.form-wrap{padding:0 14px 14px}
.form-title{font-family:Bebas Neue,Impact,sans-serif;font-size:14px;letter-spacing:3px;color:#f5f0e8;margin-bottom:12px}
.field-label{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(245,240,232,.35);margin-bottom:5px;margin-top:10px;display:block}
.field-inp{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:4px;padding:12px;font-size:14px;color:#f5f0e8;font-family:Montserrat,Arial,sans-serif;display:block}
.field-inp:focus{outline:none;border-color:rgba(201,168,76,.4)}
.field-sel{width:100%;background:#111;border:1px solid rgba(255,255,255,.1);border-radius:4px;padding:12px;font-size:14px;color:#f5f0e8;font-family:Montserrat,Arial,sans-serif;display:block}
.r2{display:flex;gap:8px}
.r2 .c{flex:1}
.btn-add{width:100%;background:#C0001A;border:none;border-radius:4px;padding:14px;font-family:Bebas Neue,Impact,sans-serif;font-size:15px;letter-spacing:3px;color:#fff;margin-top:12px;display:block;cursor:pointer;-webkit-appearance:none}
.btn-add:active{opacity:.85}

/* FILTRES */
.filters{display:flex;gap:6px;padding:0 14px 12px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.filters::-webkit-scrollbar{display:none}
.filter-btn{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:7px 14px;font-size:10px;font-weight:700;letter-spacing:2px;color:rgba(245,240,232,.4);white-space:nowrap;cursor:pointer;-webkit-appearance:none;font-family:Montserrat,Arial,sans-serif;flex-shrink:0}
.filter-btn.active{background:rgba(192,0,26,.15);border-color:rgba(192,0,26,.4);color:#ff7070}

/* SEARCH */
.search-wrap{padding:0 14px 12px}
.search-inp{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:4px;padding:11px 14px;font-size:13px;color:#f5f0e8;font-family:Montserrat,Arial,sans-serif;display:block}
.search-inp:focus{outline:none;border-color:rgba(201,168,76,.3)}

/* SEPARATOR */
.sep{height:1px;background:rgba(255,255,255,.06);margin:4px 14px 14px}

/* LISTE */
.list-title{font-family:Bebas Neue,Impact,sans-serif;font-size:14px;letter-spacing:3px;color:#f5f0e8;padding:0 14px;margin-bottom:10px}
.prospect-list{padding:0 14px;display:flex;flex-direction:column;gap:10px;padding-bottom:40px}

/* CARD PROSPECT */
.pcard{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.07);border-radius:8px;overflow:hidden}
.pcard-top{padding:14px;display:flex;align-items:center;justify-content:space-between}
.pcard-left{display:flex;flex-direction:column;gap:4px}
.pcard-name{font-size:14px;font-weight:700;color:#f5f0e8}
.pcard-meta{display:flex;align-items:center;gap:8px}
.pcard-platform{font-size:10px;font-weight:600;color:rgba(245,240,232,.4);letter-spacing:1px}
.pcard-date{font-size:10px;color:rgba(245,240,232,.25)}
.pcard-status{font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:3px 8px;border-radius:2px;flex-shrink:0}
.st-new{background:rgba(122,184,255,.1);color:#7ab8ff}
.st-contact{background:rgba(255,200,50,.1);color:#ffc832}
.st-relance{background:rgba(255,140,50,.1);color:#ff8c32}
.st-close{background:rgba(100,200,100,.1);color:#80d080}
.st-lost{background:rgba(192,0,26,.1);color:#ff7070}
.pcard-note{padding:0 14px 12px;font-size:11px;font-weight:300;color:rgba(245,240,232,.5);line-height:1.6;border-top:1px solid rgba(255,255,255,.04);padding-top:10px;margin-top:0}
.pcard-actions{display:flex;border-top:1px solid rgba(255,255,255,.06)}
.pact-btn{flex:1;padding:10px;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;border:none;background:none;color:rgba(245,240,232,.4);cursor:pointer;font-family:Montserrat,Arial,sans-serif;border-right:1px solid rgba(255,255,255,.06)}
.pact-btn:last-child{border-right:none}
.pact-btn:active{background:rgba(255,255,255,.04)}
.pact-btn.red{color:#ff7070}
.pact-btn.gold{color:#C9A84C}

.empty-state{text-align:center;padding:40px 20px;color:rgba(245,240,232,.2)}
.empty-icon{font-size:36px;display:block;margin-bottom:10px}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#C9A84C;color:#050505;font-size:11px;font-weight:700;letter-spacing:2px;padding:10px 20px;border-radius:4px;display:none;z-index:200;white-space:nowrap}
</style>

</head>
<body>

<div class="hdr">
  <a class="hdr-back" href="dashboard.html">← Retour</a>
  <div class="hdr-logo">CRM <b>TRACKER</b></div>
</div>

<!-- STATS -->

<div class="stats">
  <div class="stat"><span class="stat-n" style="color:#f5f0e8" id="sTotal">0</span><span class="stat-l">Total</span></div>
  <div class="stat"><span class="stat-n" style="color:#7ab8ff" id="sNew">0</span><span class="stat-l">Nouveau</span></div>
  <div class="stat"><span class="stat-n" style="color:#C9A84C" id="sContact">0</span><span class="stat-l">Contacte</span></div>
  <div class="stat"><span class="stat-n" style="color:#80d080" id="sClose">0</span><span class="stat-l">Clos</span></div>
</div>

<!-- FORM -->

<div class="form-wrap">
  <div class="form-title">AJOUTER UN PROSPECT</div>
  <div class="r2">
    <div class="c"><span class="field-label">Prenom Nom</span><input class="field-inp" id="fNom" type="text" placeholder="Jean Dupont" autocomplete="off"></div>
    <div class="c"><span class="field-label">Plateforme</span>
      <select class="field-sel" id="fPlat">
        <option>Instagram</option>
        <option>TikTok</option>
        <option>Snapchat</option>
        <option>WhatsApp</option>
        <option>Autre</option>
      </select>
    </div>
  </div>
  <div class="r2">
    <div class="c"><span class="field-label">Statut</span>
      <select class="field-sel" id="fStat">
        <option value="new">Nouveau</option>
        <option value="contact">Contacte</option>
        <option value="relance">Relance</option>
        <option value="close">Clos</option>
        <option value="lost">Perdu</option>
      </select>
    </div>
    <div class="c"><span class="field-label">Note</span><input class="field-inp" id="fNote" type="text" placeholder="Ex: interesse..." autocomplete="off"></div>
  </div>
  <button class="btn-add" onclick="addProspect()">AJOUTER LE PROSPECT</button>
</div>

<div class="sep"></div>

<!-- SEARCH + FILTRES -->

<div class="search-wrap">
  <input class="search-inp" id="srch" type="text" placeholder="Rechercher un prospect..." oninput="renderList()">
</div>
<div class="filters">
  <button class="filter-btn active" onclick="setFilter('all', this)">Tous</button>
  <button class="filter-btn" onclick="setFilter('new', this)">Nouveaux</button>
  <button class="filter-btn" onclick="setFilter('contact', this)">Contactes</button>
  <button class="filter-btn" onclick="setFilter('relance', this)">Relances</button>
  <button class="filter-btn" onclick="setFilter('close', this)">Clos</button>
  <button class="filter-btn" onclick="setFilter('lost', this)">Perdus</button>
</div>

<!-- LISTE -->

<div class="list-title" id="listTitle">MES PROSPECTS</div>
<div class="prospect-list" id="pList"></div>

<div class="toast" id="toast"></div>

<script>
var currentFilter = "all";

var STAT_LABELS = {new:"Nouveau", contact:"Contacte", relance:"Relance", close:"Clos", lost:"Perdu"};
var STAT_CLASS = {new:"st-new", contact:"st-contact", relance:"st-relance", close:"st-close", lost:"st-lost"};

function gc(){try{return JSON.parse(localStorage.getItem("crm")||"[]")}catch(e){return[]}}
function sc(a){localStorage.setItem("crm",JSON.stringify(a))}
function gv(id){var e=document.getElementById(id);return e?e.value.trim():""}
function sv(id,v){var e=document.getElementById(id);if(e)e.value=v}

function addProspect(){
  var nom = gv("fNom");
  if(!nom){toast("Entre un nom");return}
  var a = gc();
  a.unshift({
    id: Date.now(),
    nom: nom,
    plat: gv("fPlat"),
    stat: document.getElementById("fStat").value,
    note: gv("fNote"),
    dt: new Date().toLocaleDateString("fr-FR")
  });
  sc(a);
  sv("fNom",""); sv("fNote","");
  renderList(); updateStats();
  toast("Prospect ajoute !");
}

function delProspect(id){
  sc(gc().filter(function(c){return c.id !== id}));
  renderList(); updateStats(); toast("Supprime");
}

function copyProspect(id){
  var a = gc(), c = null;
  for(var i=0;i<a.length;i++){if(a[i].id===id){c=a[i];break}}
  if(!c)return;
  var txt = c.nom + " — " + c.plat + " — " + (STAT_LABELS[c.stat]||c.stat);
  if(c.note) txt += " — " + c.note;
  doCopy(txt,"Copie !");
}

function changeStatus(id, newStat){
  var a = gc();
  for(var i=0;i<a.length;i++){if(a[i].id===id){a[i].stat=newStat;break}}
  sc(a); renderList(); updateStats(); toast("Statut mis a jour");
}

function setFilter(f, btn){
  currentFilter = f;
  document.querySelectorAll(".filter-btn").forEach(function(b){b.classList.remove("active")});
  btn.classList.add("active");
  renderList();
}

function renderList(){
  var q = gv("srch").toLowerCase();
  var a = gc().filter(function(c){
    var matchQ = !q || (c.nom+c.plat+(c.note||"")).toLowerCase().indexOf(q) !== -1;
    var matchF = currentFilter === "all" || c.stat === currentFilter;
    return matchQ && matchF;
  });

  document.getElementById("listTitle").textContent = "MES PROSPECTS (" + a.length + ")";

  var container = document.getElementById("pList");
  container.innerHTML = "";

  if(!a.length){
    container.innerHTML = "<div class='empty-state'><span class='empty-icon'>📭</span><div>Aucun prospect</div></div>";
    return;
  }

  for(var i=0;i<a.length;i++){
    var c = a[i];
    var card = document.createElement("div");
    card.className = "pcard";

    var top = document.createElement("div");
    top.className = "pcard-top";

    var left = document.createElement("div");
    left.className = "pcard-left";
    var nameEl = document.createElement("div");
    nameEl.className = "pcard-name";
    nameEl.textContent = c.nom;
    var meta = document.createElement("div");
    meta.className = "pcard-meta";
    var platEl = document.createElement("span");
    platEl.className = "pcard-platform";
    platEl.textContent = c.plat;
    var dateEl = document.createElement("span");
    dateEl.className = "pcard-date";
    dateEl.textContent = c.dt;
    meta.appendChild(platEl); meta.appendChild(dateEl);
    left.appendChild(nameEl); left.appendChild(meta);

    var statEl = document.createElement("div");
    statEl.className = "pcard-status " + (STAT_CLASS[c.stat]||"st-new");
    statEl.textContent = STAT_LABELS[c.stat]||c.stat;

    top.appendChild(left); top.appendChild(statEl);
    card.appendChild(top);

    if(c.note){
      var noteEl = document.createElement("div");
      noteEl.className = "pcard-note";
      noteEl.textContent = c.note;
      card.appendChild(noteEl);
    }

    var actions = document.createElement("div");
    actions.className = "pcard-actions";

    var statSel = document.createElement("select");
    statSel.style.cssText = "flex:2;padding:10px 8px;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;border:none;border-right:1px solid rgba(255,255,255,.06);background:transparent;color:rgba(245,240,232,.5);font-family:Montserrat,Arial,sans-serif;cursor:pointer";
    var opts = ["new","contact","relance","close","lost"];
    for(var j=0;j<opts.length;j++){
      var opt = document.createElement("option");
      opt.value = opts[j];
      opt.textContent = STAT_LABELS[opts[j]];
      opt.style.background = "#111";
      if(opts[j]===c.stat) opt.selected = true;
      statSel.appendChild(opt);
    }
    (function(cid){
      statSel.onchange = function(){changeStatus(cid, this.value)};
    })(c.id);

    var btnCopy = document.createElement("button");
    btnCopy.className = "pact-btn gold";
    btnCopy.textContent = "COPIER";
    (function(cid){btnCopy.onclick = function(){copyProspect(cid)}})(c.id);

    var btnDel = document.createElement("button");
    btnDel.className = "pact-btn red";
    btnDel.textContent = "X";
    (function(cid){btnDel.onclick = function(){delProspect(cid)}})(c.id);

    actions.appendChild(statSel);
    actions.appendChild(btnCopy);
    actions.appendChild(btnDel);
    card.appendChild(actions);

    container.appendChild(card);
  }
}

function updateStats(){
  var a = gc();
  var newC=0, contact=0, close=0;
  for(var i=0;i<a.length;i++){
    if(a[i].stat==="new") newC++;
    else if(a[i].stat==="contact"||a[i].stat==="relance") contact++;
    else if(a[i].stat==="close") close++;
  }
  document.getElementById("sTotal").textContent = a.length;
  document.getElementById("sNew").textContent = newC;
  document.getElementById("sContact").textContent = contact;
  document.getElementById("sClose").textContent = close;
}

function doCopy(txt, msg){
  if(navigator.clipboard){navigator.clipboard.writeText(txt).then(function(){toast(msg)})}
  else{var ta=document.createElement("textarea");ta.value=txt;ta.style.cssText="position:fixed;top:0;left:0;opacity:0;font-size:16px";document.body.appendChild(ta);ta.focus();ta.select();try{document.execCommand("copy")}catch(e){}document.body.removeChild(ta);toast(msg)}
}

function toast(msg){
  var t=document.getElementById("toast");
  t.textContent=msg;t.style.display="block";
  setTimeout(function(){t.style.display="none"},2500);
}

renderList(); updateStats();
</script>

</body>
</html>
