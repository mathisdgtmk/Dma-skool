<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DMA</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050505;color:#f5f0e8;font-family:Montserrat,Arial,sans-serif;padding:20px 16px 80px}
.logo{font-family:Bebas Neue,Impact,sans-serif;font-size:20px;letter-spacing:4px;padding-bottom:16px;border-bottom:2px solid #C0001A;margin-bottom:20px}
.logo b{color:#C0001A;font-weight:400}
.stats{display:flex;gap:8px;margin-bottom:24px}
.stat{flex:1;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:6px;padding:12px 8px;text-align:center}
.sn{font-family:Bebas Neue,Impact,sans-serif;font-size:28px}
.sl{font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(245,240,232,.3);margin-top:2px}
h2{font-family:Bebas Neue,Impact,sans-serif;font-size:16px;letter-spacing:3px;margin-bottom:16px}
.lbl{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(245,240,232,.4);margin-bottom:6px;margin-top:14px;display:block}
.inp{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:4px;padding:13px 12px;font-size:15px;color:#f5f0e8;display:block;font-family:inherit}
.auto{background:rgba(201,168,76,.08);border-color:rgba(201,168,76,.2);color:#C9A84C;font-weight:600}
.sel{width:100%;background:#111;border:1px solid rgba(255,255,255,.12);border-radius:4px;padding:13px 12px;font-size:15px;color:#f5f0e8;display:block;font-family:inherit}
.r2{display:flex;gap:8px;margin-bottom:2px}
.r2 .c{flex:1}
.btn{width:100%;padding:18px;margin-top:20px;background:#C0001A;border:none;border-radius:6px;font-family:Bebas Neue,Impact,sans-serif;font-size:18px;letter-spacing:4px;color:#fff;cursor:pointer;display:block}
.sep{height:1px;background:rgba(255,255,255,.08);margin:24px 0}
.srch{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:4px;padding:10px 12px;font-size:13px;color:#f5f0e8;font-family:inherit;margin-bottom:12px;display:block}
.bex{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:4px;padding:13px;font-family:Bebas Neue,Impact,sans-serif;font-size:13px;letter-spacing:3px;color:rgba(245,240,232,.4);cursor:pointer;margin-top:8px;display:block}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#C9A84C;color:#050505;font-size:12px;font-weight:700;letter-spacing:2px;padding:12px 24px;border-radius:4px;display:none;z-index:999;white-space:nowrap}
</style>
</head>
<body>

<div class="logo">DMA <b>ADMIN</b></div>

<div class="stats">
  <div class="stat"><div class="sn" style="color:#C0001A" id="t0">0</div><div class="sl">Total</div></div>
  <div class="stat"><div class="sn" style="color:#7ab8ff" id="t1">0</div><div class="sl">Starter</div></div>
  <div class="stat"><div class="sn" style="color:#C9A84C" id="t2">0</div><div class="sl">Premium</div></div>
  <div class="stat"><div class="sn" style="color:#80d080" id="t3">0</div><div class="sl">Du King</div></div>
</div>

<h2>NOUVEAU CLIENT</h2>

<div class="r2">
  <div class="c"><span class="lbl">Prenom</span><input class="inp" id="fP" type="text" placeholder="Jean" oninput="gen()" autocomplete="off"></div>
  <div class="c"><span class="lbl">Nom</span><input class="inp" id="fN" type="text" placeholder="Dupont" autocomplete="off"></div>
</div>
<div class="r2">
  <div class="c"><span class="lbl">Offre</span><select class="sel" id="fT"><option value="s">Starter 249e</option><option value="p">Premium 349e</option><option value="d">Du King</option></select></div>
  <div class="c"><span class="lbl">Bonus IA</span><select class="sel" id="fB" onchange="gen()"><option value="n">Non</option><option value="o">Oui</option></select></div>
</div>
<span class="lbl">Identifiant (auto)</span>
<input class="inp auto" id="fL" type="text" readonly>
<span class="lbl">Mot de passe (auto)</span>
<input class="inp auto" id="fPW" type="text" readonly>
<span class="lbl">Code Bonus IA (auto)</span>
<input class="inp auto" id="fCB" type="text" readonly>
<span class="lbl">Note</span>
<input class="inp" id="fNO" type="text" placeholder="Ex: paye en 2 fois" autocomplete="off">

<input type="submit" value="CREER LE CLIENT" onclick="add();return false;" style="width:100%;padding:18px;margin-top:20px;background:#C0001A;border:none;border-radius:6px;font-family:Bebas Neue,Impact,sans-serif;font-size:18px;letter-spacing:4px;color:#fff;cursor:pointer;display:block;-webkit-appearance:none">

<div class="sep"></div>
<h2>MES CLIENTS</h2>
<input class="srch" id="sr" type="text" placeholder="Rechercher..." oninput="render()">
<div id="li"></div>
<button class="bex" onclick="exp()">EXPORTER TOUS LES ACCES</button>

<div class="toast" id="toast"></div>

<script>
var TL = {s:"Starter",p:"Premium",d:"Du King"};

function r(a,b){return Math.floor(Math.random()*(b-a)+a)}
function gi(id){return document.getElementById(id)}
function gv(id){var e=gi(id);return e?e.value.trim():""}
function sv(id,v){var e=gi(id);if(e)e.value=v}
function gc(){try{return JSON.parse(localStorage.getItem("dc")||"[]")}catch(x){return[]}}
function sc(a){localStorage.setItem("dc",JSON.stringify(a))}

function gen(){
  var p=gv("fP");
  if(!p){sv("fL","");sv("fPW","");sv("fCB","");return}
  sv("fL",p.toLowerCase()+r(100,999));
  sv("fPW",p+r(100,999)+"k");
  sv("fCB",gi("fB").value==="o"?"DMA"+p.toUpperCase()+r(1000,9999):"");
}

function add(){
  var pr=gv("fP"),lo=gv("fL"),pw=gv("fPW");
  if(!pr){toast("Entre le prenom");return}
  if(!lo){gen();lo=gv("fL")}
  var a=gc();
  a.unshift({id:Date.now(),pr:pr,no:gv("fN"),lo:lo,pw:pw,ti:gi("fT").value,bo:gi("fB").value,cb:gv("fCB"),nt:gv("fNO"),dt:new Date().toLocaleDateString("fr-FR")});
  sc(a);
  ["fP","fN","fL","fPW","fCB","fNO"].forEach(function(id){sv(id,"")});
  render();stats();toast("Client cree !");
}

function del(id){
  sc(gc().filter(function(c){return c.id!==id}));
  render();stats();toast("Supprime");
}

function copy(id){
  var a=gc(),c=null;
  for(var i=0;i<a.length;i++){if(a[i].id===id){c=a[i];break}}
  if(!c)return;
  var t={s:"Starter 249e",p:"Premium 349e",d:"Du King"};
  var txt="Acces DMA - "+c.pr+" "+c.no+"
"+"Site : mathisdgtmk.github.io/Dma-skool
"+"Identifiant : "+c.lo+"
"+"Mot de passe : "+c.pw+"
"+"Offre : "+(t[c.ti]||c.ti);
  if(c.bo==="o"&&c.cb)txt+="
Code Bonus IA : "+c.cb;
  txt+="
Bonne formation !";
  doCopy(txt,"Copie pret a envoyer !");
}

function exp(){
  var a=gc();
  if(!a.length){toast("Aucun client");return}
  var txt="CLIENTS DMA

";
  for(var i=0;i<a.length;i++){
    var c=a[i];
    txt+=(i+1)+". "+c.pr+" "+c.no+"
Login: "+c.lo+" | Mdp: "+c.pw+"
Offre: "+(TL[c.ti]||c.ti)+(c.bo==="o"&&c.cb?"
Code: "+c.cb:"")+"

";
  }
  doCopy(txt,"Export copie !");
}

function doCopy(txt,msg){
  if(navigator.clipboard){navigator.clipboard.writeText(txt).then(function(){toast(msg)}).catch(function(){fb(txt,msg)})}
  else{fb(txt,msg)}
}

function fb(txt,msg){
  var ta=document.createElement("textarea");
  ta.value=txt;ta.style.position="fixed";ta.style.top="0";ta.style.left="0";ta.style.opacity="0";ta.style.fontSize="16px";
  document.body.appendChild(ta);ta.focus();ta.select();
  try{document.execCommand("copy")}catch(e){}
  document.body.removeChild(ta);toast(msg);
}

function render(){
  var q=gv("sr").toLowerCase();
  var a=gc().filter(function(c){return !q||(c.pr+c.no+c.lo).toLowerCase().indexOf(q)!==-1});
  var li=gi("li");
  li.innerHTML="";
  if(!a.length){
    var emp=document.createElement("div");emp.style.cssText="text-align:center;padding:24px;color:rgba(245,240,232,.2)";emp.textContent="Aucun client encore";li.appendChild(emp);
    return;
  }
  for(var i=0;i<a.length;i++){
    var c=a[i];
    var div=document.createElement("div");
    div.style.cssText="background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.07);border-radius:6px;padding:14px;margin-bottom:10px";

    var top=document.createElement("div");
    top.style.cssText="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px";
    var nm=document.createElement("div");
    nm.style.cssText="font-size:14px;font-weight:700";
    nm.textContent=c.pr+" "+c.no;
    var ti=document.createElement("span");
    ti.style.cssText="font-size:8px;font-weight:700;letter-spacing:2px;padding:3px 8px;border-radius:2px;text-transform:uppercase;"+(c.ti==="p"?"background:rgba(201,168,76,.1);color:#C9A84C":c.ti==="d"?"background:rgba(192,0,26,.1);color:#ff7070":"background:rgba(122,184,255,.1);color:#7ab8ff");
    ti.textContent=TL[c.ti]||c.ti;
    top.appendChild(nm);top.appendChild(ti);div.appendChild(top);

    var cr=document.createElement("div");
    cr.style.cssText="background:#0a0a0a;border:1px solid rgba(255,255,255,.06);border-radius:4px;padding:10px 12px;margin-bottom:8px";

    function row(l,v,col){
      var d=document.createElement("div");
      d.style.cssText="display:flex;justify-content:space-between;margin-bottom:4px";
      var sl=document.createElement("span");
      sl.style.cssText="font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:rgba(245,240,232,.3)";
      sl.textContent=l;
      var sv2=document.createElement("span");
      sv2.style.cssText="font-size:12px;font-weight:600;font-family:monospace;color:"+(col||"#C9A84C");
      sv2.textContent=v;
      d.appendChild(sl);d.appendChild(sv2);
      return d;
    }

    cr.appendChild(row("Login",c.lo,null));
    cr.appendChild(row("Mdp",c.pw,null));
    if(c.bo==="o"&&c.cb)cr.appendChild(row("Code IA",c.cb,null));
    cr.appendChild(row("Date",c.dt,"rgba(245,240,232,.3)"));
    div.appendChild(cr);

    var ca=document.createElement("div");
    ca.style.cssText="display:flex;gap:6px";
    var bc=document.createElement("button");
    bc.style.cssText="flex:1;background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.2);border-radius:4px;padding:10px;font-size:10px;font-weight:700;color:#C9A84C;cursor:pointer;font-family:inherit";
    bc.textContent="COPIER ET ENVOYER";
    var bd=document.createElement("button");
    bd.style.cssText="background:rgba(192,0,26,.08);border:1px solid rgba(192,0,26,.2);border-radius:4px;padding:10px 14px;cursor:pointer;color:#ff7070;font-family:inherit";
    bd.textContent="X";
    (function(cid){
      bc.onclick=function(){copy(cid)};
      bd.onclick=function(){del(cid)};
    })(c.id);
    ca.appendChild(bc);ca.appendChild(bd);div.appendChild(ca);
    li.appendChild(div);
  }
}

function stats(){
  var a=gc(),s=0,p=0,d=0;
  for(var i=0;i<a.length;i++){if(a[i].ti==="s")s++;else if(a[i].ti==="p")p++;else d++}
  gi("t0").textContent=a.length;gi("t1").textContent=s;gi("t2").textContent=p;gi("t3").textContent=d;
}

function toast(msg){
  var t=gi("toast");t.textContent=msg;t.style.display="block";
  setTimeout(function(){t.style.display="none"},2500);
}

render();stats();
</script>

</body>
</html>
